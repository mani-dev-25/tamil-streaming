<!DOCTYPE html>
<html>
<head>
<title>Tamil Cartoon Streaming</title>
<style>
/* ===== BASE ===== */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f0f0f;
color:#ffffff;
}

/* ===== HEADER ===== */

header{
background:#111;
padding:20px;
text-align:center;
font-size:26px;
font-weight:700;
letter-spacing:1px;
}

/* ===== GRID (2 PER ROW) ===== */

.grid{
display:grid;
grid-template-columns:repeat(2, 1fr);
gap:22px;
padding:25px;
}

/* ===== CARD ===== */

.card{
background:#1c1c1c;
border-radius:14px;
overflow:hidden;
display:flex;
flex-direction:column;
height:340px;
transition:transform 0.3s ease, box-shadow 0.3s ease;
}

/* Hover Effect */

.card:hover{
transform:translateY(-6px) scale(1.02);
box-shadow:0 8px 20px rgba(0,0,0,0.6);
}

/* ===== VIDEO ===== */

.card video{
width:100%;
height:230px;
object-fit:cover;
background:black;
}

/* ===== TITLE ===== */

.card h3{
margin:0;
padding:12px;
font-size:15px;
text-align:center;
color:#e5e5e5;
}

/* ===== RESPONSIVE (MOBILE) ===== */

@media(max-width:768px){
.grid{
grid-template-columns:1fr;
}
.card{
height:300px;
}
.card video{
height:200px;
}
}

</style>
</head>
<body>

<header>Tamil Cartoon Streaming</header>

<div class="grid" id="grid"></div>

<script>

async function loadVideos(){
const res = await fetch("/api/videos");
const videos = await res.json();

const grid = document.getElementById("grid");

videos.forEach(video=>{
const card = document.createElement("div");
card.className="card";

card.innerHTML=`
<video controls>
<source src="${video.url}" type="video/mp4">
</video>
<h3>${video.title}</h3>
`;

grid.appendChild(card);
});
}

loadVideos();

</script>

</body>
</html>
