<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tamil Cartoon Streaming</title>
<style>

/* =========================
   BASE DESIGN
========================= */

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f0f0f;
color:#ffffff;
}

/* =========================
   HEADER
========================= */

header{
background:#111;
padding:20px;
text-align:center;
font-size:26px;
font-weight:700;
letter-spacing:1px;
}

/* =========================
   GRID LAYOUT
========================= */

.grid{
display:grid;
grid-template-columns:repeat(2, 1fr); /* 2 per row */
gap:22px;
padding:25px;
}

/* =========================
   CARD STYLE
========================= */

.card{
background:#1c1c1c;
border-radius:16px;
overflow:hidden;
display:flex;
flex-direction:column;
transition:transform 0.3s ease, box-shadow 0.3s ease;
}

/* Hover Effect */

.card:hover{
transform:translateY(-6px);
box-shadow:0 10px 25px rgba(0,0,0,0.7);
}

/* =========================
   VIDEO STYLE
========================= */

.card video{
width:100%;
aspect-ratio:16/9;
object-fit:cover;
display:block; /* 🔥 removes bottom gap */
background:black;
}

/* =========================
   TITLE STYLE
========================= */

.card h3{
margin:0;
padding:14px;
font-size:15px;
text-align:center;
color:#e5e5e5;
background:#1c1c1c;
}

/* =========================
   RESPONSIVE DESIGN
========================= */

@media(max-width:768px){
.grid{
grid-template-columns:1fr; /* Mobile = 1 per row */
padding:15px;
gap:18px;
}

.card h3{
font-size:14px;
}
}

</style>
</head>
<body>

<header>Tamil Cartoon Streaming</header>

<div class="grid" id="grid"></div>

<script>

async function loadVideos(){
const res = await fetch("/api/videos");
const videos = await res.json();

const grid = document.getElementById("grid");

videos.forEach(video=>{
const card = document.createElement("div");
card.className="card";

card.innerHTML=`
<video controls style="width:100%; height:auto;">
<source src="${video.url}" type="video/mp4">
</video>
<h3>${video.title}</h3>
`;

grid.appendChild(card);
});
}

loadVideos();

</script>

</body>
</html>
